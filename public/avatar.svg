<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Profile avatar</title>
  <desc id="desc">Abstract profile avatar with gradient background and person silhouette.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <clipPath id="clipCircle">
      <circle cx="128" cy="128" r="124" />
    </clipPath>
  </defs>

  <circle cx="128" cy="128" r="124" fill="url(#bg)" />

  <g clip-path="url(#clipCircle)">
    <rect x="0" y="0" width="256" height="256" fill="url(#glow)" />
    <circle cx="128" cy="96" r="46" fill="#f8fafc" fill-opacity="0.94" />
    <path d="M48 248c10-47 44-76 80-76s70 29 80 76" fill="#f8fafc" fill-opacity="0.94" />
  </g>

  <circle cx="128" cy="128" r="124" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="4" />
</svg>
